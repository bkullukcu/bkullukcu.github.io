<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a1929" />
    <meta name="description" content="Portfolio of Berkay Kullukçu, an acoustics researcher and mechanical engineer working on vehicle sound, psychoacoustics, vibro-acoustic diagnostics, signal processing, and experimental methods." />
    <link rel="apple-touch-icon" href="./logo192.png" />
    <link rel="manifest" href="./manifest.json" />
    <title>Loading...</title>
    <script>
      (function () {
        var lang = "en";
        try { lang = localStorage.getItem("portfolioLanguage") === "de" ? "de" : "en"; } catch (e) {}
        document.documentElement.lang = lang;
        fetch(lang === "de" ? "./config-de.json" : "./config.json")
          .then(function(r) { return r.json(); })
          .then(function(c) {
            document.title = c.site.title + (lang === "de" ? " | Portfolio" : " | Portfolio");
            var desc = document.querySelector('meta[name="description"]');
            if (desc) desc.setAttribute("content", c.site.description);
          })
          .catch(function() {});
      })();
    </script>
    <script type="module" crossorigin src="./assets/index-bilingual-project-list.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CIfVvUo9.css">
  </head>

  </body>
</html>
